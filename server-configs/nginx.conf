# ----------------------------------------------------------------------
# SKYHAUL - Nginx Production Server Hardening configuration
# ----------------------------------------------------------------------

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name skyhaul-transit.com www.skyhaul-transit.com; # Replace with your actual domain

    # Return 301 Moved Permanently for SSL redirection
    return 301 https://$host$request_uri;
}

# HTTPS - Secured Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skyhaul-transit.com www.skyhaul-transit.com; # Replace with your actual domain

    # SSL Certificates (Configure paths to your actual certificates)
    # ssl_certificate /etc/letsencrypt/live/skyhaul-transit.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/skyhaul-transit.com/privkey.pem;

    # SSL Protocols & Ciphers (Modern security recommendations)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Disable Directory Listing
    autoindex off;

    # 1. Block Access to Sensitive Files & Folders
    location ~ /\.(env|git|npmrc) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(package\.json|package-lock\.json|tsconfig\.json|next\.config) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 2. Gzip Compression Config
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-opentype
        application/x-font-truetype
        application/x-font-ttf
        application/x-javascript
        application/xhtml+xml
        application/xml
        font/opentype
        font/otf
        font/ttf
        image/svg+xml
        image/x-icon
        text/css
        text/html
        text/javascript
        text/plain
        text/xml;

    # 3. Security Headers (Always parameter ensures headers are sent on error responses too)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Content Security Policy (Adjust connect-src if you integrate external services)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.unsplash.com; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # 4. Next.js App Proxy
    location / {
        proxy_pass http://localhost:3000; # Address where Next.js is running (e.g., pm2 or node)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
